<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lock In - Roast History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      -webkit-app-region: drag;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #e94560;
    }

    .clear-btn {
      -webkit-app-region: no-drag;
      padding: 6px 14px;
      border: 1px solid #e94560;
      border-radius: 8px;
      background: transparent;
      color: #e94560;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      background: #e94560;
      color: #fff;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .list::-webkit-scrollbar {
      width: 6px;
    }

    .list::-webkit-scrollbar-track {
      background: transparent;
    }

    .list::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 3px;
    }

    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #2a2a4a;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #3a3a5a;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .timestamp {
      font-size: 11px;
      color: #666;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .badge.productive {
      background: rgba(78, 204, 163, 0.15);
      color: #4ecca3;
    }

    .badge.slacking {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
    }

    .activity {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }

    .activity strong {
      color: #bbb;
    }

    .roast {
      font-size: 14px;
      line-height: 1.5;
      color: #ddd;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 8px;
    }

    .empty-icon {
      font-size: 36px;
      opacity: 0.4;
    }

    .empty p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Roast History</h1>
    <button class="clear-btn" id="clearBtn">Clear History</button>
  </div>
  <div class="list" id="list"></div>

  <script>
    const list = document.getElementById('list');
    const clearBtn = document.getElementById('clearBtn');

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;

      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;

      return d.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderHistory(history) {
      list.innerHTML = '';

      if (!history || history.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">&#128123;</div>
            <p>No roasts yet. Stay locked in.</p>
          </div>
        `;
        return;
      }

      const sorted = [...history].reverse();

      sorted.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'card';

        const productive = entry.productive;
        const icon = productive ? '\u2705' : '\u274C';
        const badgeClass = productive ? 'productive' : 'slacking';
        const badgeText = productive ? 'Productive' : 'Slacking';

        card.innerHTML = `
          <div class="card-top">
            <span class="timestamp">${formatTime(entry.timestamp)}</span>
            <span class="badge ${badgeClass}">${icon} ${badgeText}</span>
          </div>
          <p class="activity"><strong>Detected:</strong> ${escapeHtml(entry.activity || 'Unknown')}</p>
          <p class="roast">${escapeHtml(entry.message || '')}</p>
        `;

        list.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadHistory() {
      try {
        const history = await window.electronAPI.getHistory();
        renderHistory(history);
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }

    clearBtn.addEventListener('click', async () => {
      try {
        await window.electronAPI.clearHistory();
        renderHistory([]);
      } catch (err) {
        console.error('Failed to clear history:', err);
      }
    });

    loadHistory();
  </script>
</body>
</html>
